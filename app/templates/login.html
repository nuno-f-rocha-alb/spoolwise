<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Spoolwise</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
  {{ bootstrap.load_css() }}
  <style>
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(13, 110, 253, 0.08), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(13, 110, 253, 0.06), transparent 60%),
        var(--bs-body-bg);
      padding: 1.5rem;
    }
    [data-bs-theme="dark"] body {
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(13, 110, 253, 0.12), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(13, 110, 253, 0.08), transparent 60%),
        var(--bs-body-bg);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--bs-border-color);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }
    [data-bs-theme="dark"] .login-card {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .form-control:focus,
    .form-check-input:focus {
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }
    .btn-submit {
      min-height: 44px;
      transition: background-color 150ms ease, border-color 150ms ease;
    }
    #theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      cursor: pointer;
      background: var(--bs-body-bg);
      border: 1px solid var(--bs-border-color);
      color: var(--bs-body-color);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background-color 150ms ease;
    }
    #theme-toggle:hover { background: var(--bs-tertiary-bg); }
    #theme-toggle:focus-visible {
      outline: 2px solid var(--bs-primary);
      outline-offset: 2px;
    }
  </style>
  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', t);
    })();
  </script>
</head>
<body>
  <button id="theme-toggle" type="button" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">
    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="icon-sun"  xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <main class="login-card card">
    <div class="card-body p-4 p-sm-5">
      <div class="brand">
        <img src="{{ url_for('static', filename='logo.svg') }}" width="36" height="36" alt="">
        <span>Spoolwise</span>
      </div>

      <h1 class="h4 mb-1 text-center">Sign in</h1>
      <p class="text-body-secondary text-center mb-4">Welcome back. Please enter your credentials.</p>

      <div aria-live="polite" aria-atomic="true">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, msg in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
              {{ msg }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        {% endwith %}
      </div>

      <form method="post" action="{{ url_for('auth.login') }}" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            value="{{ username or '' }}"
            autocomplete="username"
            autocapitalize="off"
            spellcheck="false"
            required
            autofocus>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            autocomplete="current-password"
            required>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="remember" name="remember" value="1">
          <label class="form-check-label" for="remember">Remember me on this device</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-submit">Sign in</button>
      </form>
    </div>
  </main>

  {{ bootstrap.load_js() }}
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      function applyTheme(t) {
        document.documentElement.setAttribute('data-bs-theme', t);
        document.getElementById('icon-moon').style.display = t === 'dark' ? 'none' : '';
        document.getElementById('icon-sun').style.display  = t === 'dark' ? '' : 'none';
      }
      applyTheme(localStorage.getItem('theme') || 'light');
      btn.addEventListener('click', function () {
        var next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
