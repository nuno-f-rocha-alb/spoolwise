{% extends "base.html" %}
{% block title %}New filament{% endblock %}
{% block content %}
<h1 class="h3 mb-3">New filament</h1>
<form method="post" class="card shadow-sm">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Brand / Name</label>
        <input name="name" id="brandInput" class="form-control" required
               list="brandList" autocomplete="off">
        <datalist id="brandList">
          {% for b in brands %}<option value="{{ b }}">{% endfor %}
        </datalist>
      </div>
      <div class="col-md-3">
        <label class="form-label">Material</label>
        <input name="material" id="materialInput" class="form-control" value="PLA"
               list="materialList" autocomplete="off">
        <datalist id="materialList">
          {% for m in materials %}<option value="{{ m }}">{% endfor %}
        </datalist>
      </div>
      <div class="col-md-3">
        <label class="form-label">Color</label>
        <div class="input-group">
          <input name="color" id="colorName" class="form-control" placeholder="e.g. Black"
                 list="colorList" autocomplete="off">
          <datalist id="colorList"></datalist>
          <input type="color" id="colorPicker" name="color_hex" value="#000000"
                 class="form-control form-control-color" title="Color hex — auto-filled from Bambu palette">
        </div>
        <div class="form-text" id="colorHint"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label">Initial stock (g) <span class="text-muted">(optional)</span></label>
        <input name="stock_g" type="number" step="0.01" min="0" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Purchase price ({{ currency }}/kg) <span class="text-muted">(optional)</span></label>
        <input name="price_per_kg" type="number" step="0.0001" min="0" class="form-control">
      </div>
    </div>
  </div>
  <div class="card-footer d-flex justify-content-between">
    <a href="{{ url_for('main.filaments_list') }}" class="btn btn-link">Cancel</a>
    <button class="btn btn-primary">Create</button>
  </div>
</form>
{% endblock %}
{% block scripts %}
<script>
const DB_MATERIALS = {{ materials | tojson }};
let BAMBU = null;

fetch("{{ url_for('static', filename='bambu_colors.json') }}")
  .then(r => r.json())
  .then(data => { BAMBU = data; updateMaterialList(); updateColorList(); });

function resolveAlias(brand) {
  if (!BAMBU) return brand;
  const aliases = BAMBU._aliases || {};
  const bL = brand.toLowerCase();
  for (const [alias, target] of Object.entries(aliases)) {
    if (alias.toLowerCase() === bL) return target;
  }
  return brand;
}

function getBambuMaterials(brand) {
  if (!BAMBU) return [];
  const resolved = resolveAlias(brand);
  for (const [bKey, materials] of Object.entries(BAMBU)) {
    if (bKey.startsWith('_')) continue;
    if (bKey.toLowerCase() === resolved.toLowerCase()) return Object.keys(materials);
  }
  return [];
}

function getBambuColors(brand, material) {
  if (!BAMBU) return [];
  const resolved = resolveAlias(brand);
  for (const [bKey, materials] of Object.entries(BAMBU)) {
    if (bKey.startsWith('_')) continue;
    if (bKey.toLowerCase() !== resolved.toLowerCase()) continue;
    for (const [mKey, colors] of Object.entries(materials)) {
      if (mKey.toLowerCase() === material.toLowerCase()) return Object.keys(colors);
    }
  }
  return [];
}

function lookupHex(brand, material, color) {
  if (!BAMBU || !color) return null;
  const resolved = resolveAlias(brand);
  const cL = color.toLowerCase();
  for (const [bKey, materials] of Object.entries(BAMBU)) {
    if (bKey.startsWith('_')) continue;
    if (bKey.toLowerCase() !== resolved.toLowerCase()) continue;
    for (const [mKey, colors] of Object.entries(materials)) {
      if (mKey.toLowerCase() !== material.toLowerCase()) continue;
      for (const [cKey, hex] of Object.entries(colors)) {
        if (cKey.toLowerCase() === cL) return hex;
      }
    }
  }
  return null;
}

function setDatalist(id, values) {
  const dl = document.getElementById(id);
  dl.innerHTML = '';
  [...new Set(values)].forEach(v => {
    const o = document.createElement('option');
    o.value = v;
    dl.appendChild(o);
  });
}

function updateMaterialList() {
  const brand = document.getElementById('brandInput').value.trim();
  const bambuMats = getBambuMaterials(brand);
  setDatalist('materialList', [...DB_MATERIALS, ...bambuMats]);
}

function updateColorList() {
  const brand    = document.getElementById('brandInput').value.trim();
  const material = document.getElementById('materialInput').value.trim();
  setDatalist('colorList', getBambuColors(brand, material));
}

function tryAutoFill() {
  const brand = document.getElementById('brandInput').value.trim();
  const mat   = document.getElementById('materialInput').value.trim();
  const col   = document.getElementById('colorName').value.trim();
  const hint  = document.getElementById('colorHint');
  const hex   = lookupHex(brand, mat, col);
  if (hex) {
    document.getElementById('colorPicker').value = hex;
    hint.textContent = '✓ Bambu color matched';
    hint.className = 'form-text text-success';
  } else {
    hint.textContent = '';
  }
}

document.getElementById('brandInput').addEventListener('input', () => { updateMaterialList(); updateColorList(); tryAutoFill(); });
document.getElementById('materialInput').addEventListener('input', () => { updateColorList(); tryAutoFill(); });
document.getElementById('colorName').addEventListener('input', tryAutoFill);
</script>
{% endblock %}
