{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Global settings</h1>

<form method="post">
  <div class="row g-4">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header fw-semibold">Electricity &amp; printer</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-medium" for="elec">Electricity price ({{ currency }}/kWh)</label>
            <input id="elec" type="number" step="0.0001" min="0" name="electricity_price_per_kwh"
                   value="{{ electricity_price_per_kwh }}" class="form-control" required>
          </div>
          <div class="mb-0">
            <label class="form-label fw-medium" for="watts">Printer power (W)</label>
            <input id="watts" type="number" step="0.01" min="0" name="printer_power_watts"
                   value="{{ printer_power_watts }}" class="form-control" required>
            <div class="form-text">Electricity cost = W × print hours ÷ 1000 × price/kWh.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header fw-semibold">Business defaults</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-medium" for="profit">Default profit %</label>
            <div class="input-group" style="max-width:180px">
              <input id="profit" type="number" step="0.01" min="0" name="default_profit_pct"
                     value="{{ default_profit_pct }}" class="form-control" required>
              <span class="input-group-text">%</span>
            </div>
            <div class="form-text">Pre-filled when creating a new order.</div>
          </div>
          <div class="mb-0">
            <label class="form-label fw-medium" for="currency">Currency symbol</label>
            <input id="currency" type="text" name="currency_symbol" value="{{ currency_symbol }}"
                   class="form-control" style="max-width:100px" maxlength="5" required>
            <div class="form-text">Shown throughout the app (e.g. €, $, £).</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-4">
    <button class="btn btn-primary px-4">Save settings</button>
  </div>
</form>
{% endblock %}
