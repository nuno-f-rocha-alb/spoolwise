{% extends "base.html" %}
{% block title %}New order{% endblock %}
{% block content %}
<h1 class="h3 mb-3">New order</h1>

<form method="post" id="order-form">
  <input type="hidden" name="num_plates" id="num_plates" value="1">

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Part / project name</label>
          <input name="name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Customer</label>
          <input name="customer" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Profit %</label>
          <input name="profit_pct" type="number" step="0.01" min="0" class="form-control"
                 value="{{ default_profit_pct }}" required>
        </div>
        <div class="col-md-8">
          <label class="form-label">Notes</label>
          <input name="notes" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Model links <span class="text-muted small">(MakerWorld, Printables, Thingiverse…)</span></label>
          <div id="url-rows">
            <div class="url-row d-flex gap-2 mb-2">
              <input name="model_url" type="url" class="form-control" placeholder="https://...">
              <button type="button" class="btn btn-outline-danger remove-url" tabindex="-1">×</button>
            </div>
          </div>
          <button type="button" class="btn btn-sm btn-outline-secondary" id="add-url">+ Add link</button>
        </div>
        <div class="col-12">
          <div class="form-check form-switch mt-1">
            <input class="form-check-input" type="checkbox" role="switch"
                   name="is_internal" id="is_internal" value="1">
            <label class="form-check-label" for="is_internal">
              <strong>Personal use</strong>
              <span class="text-muted small ms-1">— not counted toward revenue or profit</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Plates</h5>
    <button type="button" class="btn btn-sm btn-outline-primary" id="add-plate">+ Add plate</button>
  </div>

  {% if not filaments %}
    <div class="alert alert-warning">
      No filaments yet. <a href="{{ url_for('main.filament_new') }}">Create one first</a>.
    </div>
  {% endif %}

  <div id="plates-container">
    <div class="plate-card card mb-3 border-secondary">
      <div class="card-header d-flex justify-content-between align-items-center bg-body-secondary">
        <span class="plate-label fw-semibold">Plate 1</span>
        <button type="button" class="btn btn-sm btn-outline-danger remove-plate">× Remove plate</button>
      </div>
      <div class="card-body">
        <div class="row g-3 mb-3">
          <div class="col-auto">
            <label class="form-label">Print time</label>
            <div class="d-flex align-items-center gap-2">
              <input name="plate_0_hours" type="number" min="0" max="999" placeholder="0"
                     class="form-control plate-hours" style="width:80px" required>
              <span>h</span>
              <input name="plate_0_minutes" type="number" min="0" max="59" placeholder="0"
                     class="form-control plate-minutes" style="width:80px" required>
              <span>m</span>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0 text-muted">Filaments</h6>
          <button type="button" class="btn btn-sm btn-outline-secondary add-filament">+ Filament</button>
        </div>
        <div class="filament-rows">
          <div class="fil-row mb-2"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between mt-3">
    <a href="{{ url_for('main.orders_list') }}" class="btn btn-link">Cancel</a>
    <button class="btn btn-primary">Create order</button>
  </div>
</form>

<template id="plate-template">
  <div class="plate-card card mb-3 border-secondary">
    <div class="card-header d-flex justify-content-between align-items-center bg-body-secondary">
      <span class="plate-label fw-semibold">Plate N</span>
      <button type="button" class="btn btn-sm btn-outline-danger remove-plate">× Remove plate</button>
    </div>
    <div class="card-body">
      <div class="row g-3 mb-3">
        <div class="col-auto">
          <label class="form-label">Print time</label>
          <div class="d-flex align-items-center gap-2">
            <input type="number" min="0" max="999" placeholder="0"
                   class="form-control plate-hours" style="width:80px" required>
            <span>h</span>
            <input type="number" min="0" max="59" placeholder="0"
                   class="form-control plate-minutes" style="width:80px" required>
            <span>m</span>
          </div>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0 text-muted">Filaments</h6>
        <button type="button" class="btn btn-sm btn-outline-secondary add-filament">+ Filament</button>
      </div>
      <div class="filament-rows">
        <div class="fil-row mb-2"></div>
      </div>
    </div>
  </div>
</template>
{% endblock %}

{% block scripts %}
<script>
const FILAMENTS = {{ filaments_data | tojson }};
const CUR = '{{ currency }}';

const BRANDS = [...new Set(FILAMENTS.map(f => f.brand))].sort();

// ── build a fil-row DOM element ───────────────────────────────────────────────
function buildFilRow() {
  const wrap = document.createElement('div');
  wrap.className = 'fil-row mb-2';
  wrap.innerHTML = `
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label small mb-1 text-muted">Brand</label>
        <select class="form-select form-select-sm fil-brand"></select>
      </div>
      <div class="col-md-2">
        <label class="form-label small mb-1 text-muted">Material</label>
        <select class="form-select form-select-sm fil-material" disabled></select>
      </div>
      <div class="col-md-3">
        <label class="form-label small mb-1 text-muted">Color</label>
        <div class="input-group input-group-sm">
          <span class="input-group-text p-1 px-2">
            <span class="fil-swatch" style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#9e9e9e;border:1px solid rgba(128,128,128,.4)"></span>
          </span>
          <select class="form-select form-select-sm fil-color" disabled></select>
        </div>
      </div>
      <div class="col-md-3">
        <label class="form-label small mb-1 text-muted">Weight (g)</label>
        <input type="number" step="0.01" min="0.01" class="form-control form-control-sm fil-weight" required>
      </div>
      <div class="col-md-1">
        <button type="button" class="btn btn-outline-danger btn-sm w-100 remove-filament">×</button>
      </div>
    </div>
    <div class="fil-stock-info text-muted small mt-1 ps-1 d-none"></div>
    <input type="hidden" class="fil-id-hidden">
  `;

  // populate brand
  const brandSel = wrap.querySelector('.fil-brand');
  brandSel.innerHTML = '<option value="">— brand —</option>';
  BRANDS.forEach(b => {
    const o = document.createElement('option');
    o.value = b; o.textContent = b;
    brandSel.appendChild(o);
  });

  // events
  brandSel.addEventListener('change', () => onBrandChange(wrap));
  wrap.querySelector('.fil-material').addEventListener('change', () => onMaterialChange(wrap));
  wrap.querySelector('.fil-color').addEventListener('change', () => onColorChange(wrap));

  return wrap;
}

// ── cascade handlers ──────────────────────────────────────────────────────────
function onBrandChange(row) {
  const brand   = row.querySelector('.fil-brand').value;
  const matSel  = row.querySelector('.fil-material');
  const colSel  = row.querySelector('.fil-color');

  const materials = [...new Set(
    FILAMENTS.filter(f => f.brand === brand).map(f => f.material)
  )].sort();

  matSel.innerHTML = '<option value="">— material —</option>';
  materials.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    matSel.appendChild(o);
  });
  matSel.disabled = !brand;

  colSel.innerHTML = '<option value="">— color —</option>';
  colSel.disabled = true;

  row.querySelector('.fil-id-hidden').value = '';
  row.querySelector('.fil-swatch').style.background = '#9e9e9e';
  row.querySelector('.fil-stock-info').classList.add('d-none');
}

function onMaterialChange(row) {
  const brand    = row.querySelector('.fil-brand').value;
  const material = row.querySelector('.fil-material').value;
  const colSel   = row.querySelector('.fil-color');

  const matching = FILAMENTS.filter(f => f.brand === brand && f.material === material);

  colSel.innerHTML = '<option value="">— color —</option>';
  matching.forEach(f => {
    const o = document.createElement('option');
    o.value = f.id;
    o.textContent = f.color;
    o.dataset.hex   = f.color_hex;
    o.dataset.stock = f.stock_g;
    o.dataset.price = f.avg_price;
    colSel.appendChild(o);
  });
  colSel.disabled = !material;

  row.querySelector('.fil-id-hidden').value = '';
  row.querySelector('.fil-swatch').style.background = '#9e9e9e';
  row.querySelector('.fil-stock-info').classList.add('d-none');
}

function onColorChange(row) {
  const colSel = row.querySelector('.fil-color');
  const opt    = colSel.options[colSel.selectedIndex];
  const filId  = colSel.value;

  row.querySelector('.fil-id-hidden').value = filId;

  const swatch = row.querySelector('.fil-swatch');
  const info   = row.querySelector('.fil-stock-info');

  if (filId && opt) {
    const hex   = opt.dataset.hex || '#9e9e9e';
    const stock = parseFloat(opt.dataset.stock || 0);
    const price = parseFloat(opt.dataset.price || 0);
    swatch.style.background = hex || '#9e9e9e';
    info.innerHTML = `<span class="badge bg-secondary-subtle text-secondary-emphasis me-1">Stock: ${stock.toFixed(0)} g</span><span class="badge bg-secondary-subtle text-secondary-emphasis">${price.toFixed(2)} ${CUR}/kg</span>`;
    info.classList.remove('d-none');
  } else {
    swatch.style.background = '#9e9e9e';
    info.classList.add('d-none');
  }
}

// ── reindex: assign names to hidden inputs and weight inputs ──────────────────
function reindex() {
  const plates = container.querySelectorAll('.plate-card');
  document.getElementById('num_plates').value = plates.length;
  plates.forEach((card, pi) => {
    card.querySelector('.plate-label').textContent = `Plate ${pi + 1}`;
    card.querySelector('.plate-hours').name   = `plate_${pi}_hours`;
    card.querySelector('.plate-minutes').name = `plate_${pi}_minutes`;
    card.querySelectorAll('.fil-id-hidden').forEach(h => h.name = `plate_${pi}_filament_ids`);
    card.querySelectorAll('.fil-weight').forEach(i => i.name = `plate_${pi}_weights`);
  });
}

// ── init existing empty fil-row placeholders ──────────────────────────────────
function initEmptyRows() {
  document.querySelectorAll('.fil-row').forEach(placeholder => {
    if (!placeholder.querySelector('.fil-brand')) {
      const built = buildFilRow();
      placeholder.replaceWith(built);
    }
  });
}

// ── plate + filament add/remove ───────────────────────────────────────────────
const container = document.getElementById('plates-container');
const tmpl      = document.getElementById('plate-template');

document.getElementById('add-plate').addEventListener('click', () => {
  const clone = tmpl.content.cloneNode(true);
  container.appendChild(clone);
  initEmptyRows();
  reindex();
});

container.addEventListener('click', e => {
  if (e.target.classList.contains('remove-plate')) {
    if (container.querySelectorAll('.plate-card').length > 1) {
      e.target.closest('.plate-card').remove();
      reindex();
    }
    return;
  }
  if (e.target.classList.contains('add-filament')) {
    const rows = e.target.closest('.plate-card').querySelector('.filament-rows');
    const newRow = buildFilRow();
    rows.appendChild(newRow);
    reindex();
    return;
  }
  if (e.target.classList.contains('remove-filament')) {
    const rows = e.target.closest('.filament-rows');
    if (rows.querySelectorAll('.fil-row').length > 1) {
      e.target.closest('.fil-row').remove();
      reindex();
    }
  }
});

// ── boot ──────────────────────────────────────────────────────────────────────
initEmptyRows();
reindex();

// ── multi-url ─────────────────────────────────────────────────────────────────
document.getElementById('add-url').addEventListener('click', () => {
  const row = document.createElement('div');
  row.className = 'url-row d-flex gap-2 mb-2';
  row.innerHTML = '<input name="model_url" type="url" class="form-control" placeholder="https://..."><button type="button" class="btn btn-outline-danger remove-url" tabindex="-1">×</button>';
  document.getElementById('url-rows').appendChild(row);
  row.querySelector('input').focus();
});

document.getElementById('url-rows').addEventListener('click', e => {
  if (e.target.classList.contains('remove-url')) {
    const rows = document.querySelectorAll('#url-rows .url-row');
    if (rows.length > 1) e.target.closest('.url-row').remove();
    else e.target.closest('.url-row').querySelector('input').value = '';
  }
});
</script>
{% endblock %}
