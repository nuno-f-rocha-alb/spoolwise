name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "frontend/**"
      - "requirements.txt"
      - "Dockerfile"
      - "run.py"
  # Allow rebuilding any branch on demand (e.g. to republish a rollback image).
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # :latest for the running stack, plus an immutable :<sha> tag so a
          # specific build can always be pinned or rolled back to.
          tags: |
            nunobifes/spoolwise:latest
            nunobifes/spoolwise:${{ github.sha }}
